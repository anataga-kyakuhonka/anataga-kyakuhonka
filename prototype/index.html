<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたが脚本家</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <h1>あなたが脚本家</h1>

    <p class="catch">
        書く。その先へ。
    </p>

    <p class="text">
        脚本を書く人と、作品を求める人をつなぐ。
    </p>

    <div class="buttons">
        <button class="main">脚本を書く</button>
        <button class="sub">脚本を探す</button>
    </div>

</section>

<section class="cards">

    <h2>🔥 人気脚本</h2>

    <div class="card-list">

        <div class="card">
            <h3>君の未来</h3>
            <p>高校生の青春ストーリー</p>
        </div>

        <div class="card">
            <h3>青空シネマ</h3>
            <p>夢を追う映画監督の物語</p>
        </div>

        <div class="card">
            <h3>夏の終わり</h3>
            <p>切ない恋愛ドラマ</p>
        </div>

    </div>

</section>

<section class="info">

    <div class="info-box">

        <h2>🏆 コンテスト情報</h2>

        <p>現在募集中！あなたの作品を応募してみよう。</p>

    </div>

    <div class="info-box">

        <h2>🎬 制作会社募集</h2>

        <p>制作会社が新しい脚本を探しています。</p>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
